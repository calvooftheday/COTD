```html
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, collection, getDocs, orderBy, query, limit }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAmQir4ykeEXBNg19Ucsdk0_s2qlmYyPY8",
  authDomain: "cotd-846c4.firebaseapp.com",
  projectId: "cotd-846c4",
  storageBucket: "cotd-846c4.firebasestorage.app",
  messagingSenderId: "700565701499",
  appId: "1:700565701499:web:0ac0e7d1c92a0c738bb3de",
  measurementId: "G-X0LM3YKDEF"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

let currentLang = 'en';
let adminOpen = false;
let adminAuthed = false;
let pendingImage = null;

async function loadState() {
  try {
    const snap = await getDoc(doc(db, 'cotd', 'today'));
    return snap.exists() ? snap.data() : {};
  } catch (e) { return {}; }
}

async function saveState(s) {
  await setDoc(doc(db, 'cotd', 'today'), s);
}

async function loadArchive() {
  try {
    const q = query(collection(db, 'archive'), orderBy('date', 'desc'), limit(30));
    const snap = await getDocs(q);
    return snap.docs.map(d => d.data());
  } catch (e) { return []; }
}

async function saveArchive(state) {
  const id = Date.now().toString();
  await setDoc(doc(db, 'archive', id), state);
}

const ADMIN_PASSWORD = 'JLNL';

function toggleAdmin() {
  if (adminOpen) {
    adminOpen = false;
    document.getElementById('adminPanel').classList.remove('open');
    return;
  }
  if (adminAuthed) {
    openAdminPanel();
  } else {
    document.getElementById('pwOverlay').classList.add('open');
    setTimeout(() => document.getElementById('pwInput').focus(), 50);
  }
}

function checkPassword() {
  const val = document.getElementById('pwInput').value;
  if (val === ADMIN_PASSWORD) {
    adminAuthed = true;
    closePwModal();
    openAdminPanel();
  } else {
    const inp = document.getElementById('pwInput');
    const err = document.getElementById('pwError');
    err.textContent = 'Wrong password. Try again.';
    inp.value = '';
    inp.classList.add('shake');
    setTimeout(() => inp.classList.remove('shake'), 400);
    inp.focus();
  }
}

function closePwModal() {
  document.getElementById('pwOverlay').classList.remove('open');
  document.getElementById('pwInput').value = '';
  document.getElementById('pwError').textContent = '';
}

async function openAdminPanel() {
  adminOpen = true;
  const panel = document.getElementById('adminPanel');
  panel.classList.add('open');
  const s = await loadState();
  document.getElementById('adminName').value = s.name || '';
  document.getElementById('adminDesc').value = s.desc || '';
  document.getElementById('adminIssue').value = s.issue || '';
  if (s.imgSrc) {
    const thumb = document.getElementById('previewThumb');
    thumb.src = s.imgSrc;
    thumb.style.display = 'block';
    pendingImage = s.imgSrc;
  }
}

function handleImageUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    pendingImage = ev.target.result;
    const thumb = document.getElementById('previewThumb');
    thumb.src = pendingImage;
    thumb.style.display = 'block';
  };
  reader.readAsDataURL(file);
}

async function publishCOTD() {
  const name  = document.getElementById('adminName').value.trim();
  const desc  = document.getElementById('adminDesc').value.trim();
  const issue = document.getElementById('adminIssue').value.trim();

  const publishBtn = document.querySelector('[data-i18n="publishBtn"]');
  publishBtn.disabled = true;
  publishBtn.textContent = '…';

  const state = { name, desc, issue, imgSrc: pendingImage || null, date: new Date().toISOString() };

  try {
    await saveState(state);
    await saveArchive(state);
  } catch (e) {
    publishBtn.disabled = false;
    publishBtn.textContent = 'Publish COTD';
    alert('Error saving');
    return;
  }

  await renderHero();
  await renderArchive();
  await updateStatCount();

  publishBtn.disabled = false;
  publishBtn.textContent = 'Publish COTD';

  const msg = document.getElementById('saveMsg');
  msg.classList.add('show');
  setTimeout(() => msg.classList.remove('show'), 2500);
  setTimeout(() => toggleAdmin(), 1200);
}

async function renderHero() {
  const s = await loadState();
  document.getElementById('heroName').textContent = s.name || '—';
  document.getElementById('heroIssue').textContent = s.issue || '#—';

  const descEl = document.getElementById('heroDesc');
  if (s.desc) {
    descEl.textContent = s.desc;
  } else {
    descEl.textContent = 'No calvo has been crowned yet today.';
  }

  const imgEl = document.getElementById('heroImg');
  const phEl  = document.getElementById('heroPlaceholder');
  if (s.imgSrc) {
    imgEl.src = s.imgSrc;
    imgEl.style.display = 'block';
    phEl.style.display = 'none';
  } else {
    imgEl.style.display = 'none';
    phEl.style.display = 'flex';
  }
}

async function renderArchive() {
  const archive = await loadArchive();
  const container = document.getElementById('archiveCards');

  if (!archive.length) {
    container.innerHTML = `<div style="padding:2rem;">No previous calvos.</div>`;
    return;
  }

  container.innerHTML = archive.slice(0, 5).map(a => {
    const d = a.date ? new Date(a.date) : null;
    const dateStr = d ? d.toLocaleDateString() : '—';
    const imgContent = a.imgSrc
      ? `<img src="${a.imgSrc}" />`
      : '🔆';
    return `
      <div class="archive-card">
        <div class="archive-card-img">${imgContent}</div>
        <div class="archive-card-name">${a.name || '—'}</div>
        <div class="archive-card-date">${dateStr}</div>
      </div>`;
  }).join('');
}

async function updateStatCount() {
  const archive = await loadArchive();
  document.getElementById('statCount').textContent = archive.length || 0;
}

function renderDate() {
  const now = new Date();
  document.getElementById('header-date').textContent = now.toLocaleDateString();
}

function copyLink() {
  navigator.clipboard.writeText(window.location.href);
}

async function shareNative() {
  const s = await loadState();
  if (navigator.share) {
    navigator.share({ title: `COTD: ${s.name || ''}`, url: window.location.href });
  } else copyLink();
}

window.toggleAdmin = toggleAdmin;
window.checkPassword = checkPassword;
window.closePwModal = closePwModal;
window.publishCOTD = publishCOTD;
window.copyLink = copyLink;
window.shareNative = shareNative;
window.handleImageUpload = handleImageUpload;

renderDate();
await renderHero();
await renderArchive();
await updateStatCount();
</script>
